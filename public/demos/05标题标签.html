<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--meta描述HTML网页属性，关键词等，eso是搜索引擎的排名，eso越好排名越高越容易被点击-->
    <title>Document</title>
</head>
<body>
    <!--只有h1到h6-->
    <h1>一级标题</h1>
    <h2>二级标题</h2>
    <h3>三级标题</h3>
    <h4>四级标题</h4>
    <h5>五级标题</h5>
    <h6>六级标题</h6>
    <!--可以直接写h1然后回车会自动补全-->
    <!--生成快捷键：从h1开始生成至hN：h$*n,例如：h$*6-->
    <h1></h1>
    <h2></h2>
    <h3></h3>
    <h4></h4>
    <h5></h5>
    <h6></h6>
    <!--正确使用标题标签，不要因为加粗或型号去使用-->
    <!--标题摆放的位置可以调整，通过改变align属性align="left/center/right"-->
    <h2 align="left">二级标题</h2>
    <h3 align="center">三级</h3>
    <h4 align="right">四级标题</h4>
    <!--标红是因为不推荐使用，css会有更好地使用办法-->
</body>
</html>
