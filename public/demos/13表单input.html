<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    文本框：<input type="text" placeholder="请输入文本" name="username">
    <br><br>
    密码框：<input type="password" placeholder="请输入密码" name="pws">
    <!-- 密码不会明文表示 -->
    <br><br>
    提交按钮<input type="submit" value="登录">
    <!-- value可以把“提交”两字换成别的 -->
    <br><br>
    单选框：<input type="radio" name="gender" checked>男 <input type="radio" name="gender">女
    <br><br>
    多选框：<input type="checkbox">
    <br><br>
    上传文件：<input type="file" multiple>
    <br><br>
    兴趣爱好：<input type="checkbox" checked>画画 
    <input type="checkbox">代码
    <input type="checkbox">前端
    <!-- 表单 -->
    <!-- action服务器地址，信息要提交给谁，name表单名称，method方法，get和post方式两种 -->
    <!-- get把提交的数据url可以看到，post看不到，get一般用于提交少量数据，post提交大量数据 ,get获取post提交-->
    <!-- 表单标签 -->
    <form>
        <!-- 表单域 -->
        <input>
        <!-- 表单按钮 -->
        <input type="submit">
    </form>

</body>
</html>
