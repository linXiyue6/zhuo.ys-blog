<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- alt为了解决网速慢，图片加载不出来 -->
    <img src="阿萨背景图.jpg" alt="阿萨aza帅！">
    <img src="./屏幕截图 2024-07-19 200756.png" title="这是公差的图片，我也看不懂">
    <!-- 默认等比例缩放 -->
    <img src="./屏幕截图 2024-07-19 200756.png" width="100">
    <img src="./阿萨背景图.jpg" height="600">
    <!-- src图片的路径，alt图片代替的文本，width宽度，height高度，一般只规定宽度不规定高度，title鼠标悬停提示 -->
</body>
</html>
