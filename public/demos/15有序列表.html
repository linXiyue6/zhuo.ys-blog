<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>这是有序列表</title>
</head>
<body>
    <!-- 有序列表始于ol标签，其中包含li标签 -->
    <ol>
        <li>苹果</li>
        <li>香蕉</li>
        <li>橘子</li>
        <li>西瓜</li>
        <li>樱桃</li>
    </ol>
    <!-- ol的属性type拥有选项，默认1234，a小写字母，A大写字母，i小写罗马字符，I大写罗马字符 -->
    <ol type="a">
        <li>苹果</li>
        <li>香蕉</li>
        <li>橘子</li>
        <li>西瓜</li>
        <li>樱桃</li>
    </ol>
    <ol type="A">
        <li>苹果</li>
        <li>香蕉</li>
        <li>橘子</li>
        <li>西瓜</li>
        <li>樱桃</li>
    </ol>
    <ol type="i">
        <li>苹果</li>
        <li>香蕉</li>
        <li>橘子</li>
        <li>西瓜</li>
        <li>樱桃</li>
    </ol>
    <ol type="I">
        <li>苹果</li>
        <li>香蕉</li>
        <li>橘子</li>
        <li>西瓜</li>
        <li>樱桃</li>
    </ol>
    <!-- 有序列表可以嵌套 ,嵌套的内容要放在li标签之中-->
     <ol>
        <li>
            水果
            <ol type="a">
                <li>苹果</li>
                <li>香蕉</li>
                <li>橘子</li>
                <li>西瓜</li>
                <li>樱桃</li>
            </ol>
        </li>
        <li>蔬菜</li>
        <li>肉类</li>
     </ol>
</body>
</html>
