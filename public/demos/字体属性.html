<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 字体属性 -->
    <style>
        p{
            color: #0f0;
            /* 这个最常用，设计人员会告诉你十六进制的 */
            color: rgba(0, 255, 0, 0.5);
            /* rgba是透明度 */
            font-size: 12px;
            /* 能接受最小是12px */
            font-weight: 100;
            /* 设置字体粗细，bold粗体，bold更粗,lighter更细,100-900自定义 */
            font-style: italic;
            /* 字体效果，是否斜体，normal正常，italic斜体 */
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            /* 字体效果，可以写中文和英文，默认为微软雅黑 */
        }
    </style>
</head>
<body>
    <p>hhhhhhh</p>
</body>
</html>
