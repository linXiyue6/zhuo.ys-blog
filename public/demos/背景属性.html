<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            width: 400px;
            height: 400px;
            background-color: red;
            /* 背景颜色,注意这里的px不可省略 */
        }
        .box2{
            width: 400px;
            height: 400px;
            background-image: url("阿萨背景图.jpg");
            /* 背景图片，注意这里的px不可省略 */
            background-repeat: repeat-x;
            /* repeat-x水平重复，repeat-y垂直重复，no-repaet不重复 */
            /* background-size: 100% 100%; */
            /* cover不拉伸充满全屏，最常用，contain保持横纵比例缩放成适合块的最大程度 */
            background-position: left center;
            /* left/right/center + top/center/bottom随意搭配调整图片的位置 */
            /* x% y%第一个水平位置，第二个垂直位置，如果至指定一个，另一个默认为50%，默认是0% 0% */
            /* xpos ypos，pos是像素，类似上一个 */
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
</html>
