name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

# 必须加的权限配置，否则 GitHub 禁止部署
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # 升级到 v5，兼容 Node 24

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24  # 升级到 Node 24，解决弃用警告
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true