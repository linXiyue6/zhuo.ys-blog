<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>块元素和行内元素（内联元素）</title>
</head>
<body>
    <p>块元素会在页面中独占一行，自上而下垂直排列，可以设置width，height属性，一般块级元素可以包含行内元素和其他块级元素</p>
    <!-- 常见块元素：div,from,h1~h6,hr,p,table,ul -->
     <form>form </form>
     <h1>h1 </h1>
     <ul>ul </ul>
    <p>行内元素不会独占页面中的一行，只占自身的大小，行内元素设置widthheight属性无效，一般内联元素包含内联元素不包含块元素</p>
    <!-- 常见行内元素：a.b.em.i.span.strong等 -->
    <a href="#">a </a>
    <span>span </span>
    <em>em </em>
    <!-- 行内块级元素：能识别宽高，不换行，button，img，input -->
</body>
</html>
