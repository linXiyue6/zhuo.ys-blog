<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 全局选择器*{},匹配所有标签，优先级较低，做初始化用 -->
    <!-- 元素选择器p{}等，所有标签都能使用，选择的是所有而不是一个 -->
    <!-- 类选择器.a{}，使用率高，用.定义，只给想添加的标签使用，灵活，不能数字开头 -->
    <!-- id选择器#a{}，只能使用一次,名字是唯一的 -->
    <!-- 合并选择器p,h3{}，多个标签使用同一个选择器 -->
    <!-- 选择器的优先级：css中权重用数字衡量：内联样式1000>id选择器100>class选择器10>元素选择器1>全局选择器，如果是同级，那就按照代码执行顺序执行 -->
    <style>
        *{
            color: red;
            font-size: 30px;
        }
        p{
            color: blue;
        }
        span{
            color: green;
        }
        .a{
            color: blueviolet;
        }
        #b{
            color: brown;
        }
        h4,h5{
            color: aquamarine;
        }
    </style>
</head>
<body>

     <p>hello</p>
     <h3>world</h3>
     <p>我是<span>第二个</span></p>
     <p>我emo了</p>
     <p class="a">我也emo了</p>
     <p id="b">我也emo了</p>
     <h4>我也emo了</h4>
     <h5>我也是</h5>
</body>
</html>
