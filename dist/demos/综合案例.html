    <h1>这是一首诗</h1>
    <hr>
    <p>什么是 <a href="https://baike.baidu.com/item/%E8%AF%97%E6%AD%8C/5555">诗</a> 呢？诗是一种文学体裁，它以富有节奏和韵律的语言，通过意象、情感和思想的独特结合，传达作者的情感体验和审美追求。诗的形式多样，可以是自由诗、格律诗、散文诗等，它通常在较短的篇幅内，利用象征、暗示、隐喻等修辞手法，创造出深邃的意境和强烈的表现力。</p>
    <p><a href="./07换行与水平线.html">这也算一首诗</a> </p>

    <h2>关于什么的诗？</h2>
    <p>你要说它关于 <strong>未来</strong>，其实不对，你要说它关于 <strong>迷茫</strong>，好像也不对，<ins>我说，它关于你自己，你曾看见了的，现在又看不见了的</ins> </p>
