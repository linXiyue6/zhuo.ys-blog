<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h3{
            text-align: center;
            /* left center right */
            text-decoration: underline;
            /* underline:下划线overline上划线line-through删除线 */

        }
        p{
             text-transform: lowercase;
            /* capitalize首字母大写uppercase全部大写lowercase全部小写 */
            text-indent: 30px;
            /* 首行缩进30是两个中文字符的大小 */
        }
    </style>
</head>
<body>
    <h3>标题</h3>
    <p>hello world</p>
</body>
</html>
