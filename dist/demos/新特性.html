<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 50px;
            background-color: blueviolet;
            margin: 0 auto;
            border-radius: 20px;
            /* 圆角效果，写100%完全变成圆形 */
            /* 一个值：四个角相同，两个值：左上和右下角 */
            /* 三个值用不到，四个值：左上右上，右下，左下 */
            box-shadow: 10px 10px 10px gray;
            /* 四个值：水平位置 垂直位置 模糊距离 阴影颜色，前两个必选，其实是阴影距离居中的偏移量 */
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
