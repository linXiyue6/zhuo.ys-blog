    <script>

        function throttle(fn,delay){
            var valid =true;
            return function(){
                if (!valid){
                    return false;//第一次执行的时候啥都不会干
                }
                valid = false;
                setTimeout(function(){
                    fn();
                    valid = true;
                },delay)
            }
        }

                // 滚动事件
        window.onscroll = throttle(scrolhandle,2000)
        
        function scrolhandle(){
            console.log("页面滚动");
            var scrolltop = document.documentElement.scrollTop;
            console.log(scrolltop);
            
        }

    </script>
