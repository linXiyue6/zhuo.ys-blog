<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,td{
            border: 3px solid red;
            /* 边框粗细 solid实线 颜色 */
        }
        table{
            border-collapse: collapse;
            /* 边框折叠 */
            width: 500px;
            height: 300px;
            /* 宽高 */
        }
        td{
            text-align: center;
            /* 表格中的文本水平对齐方式 */
            height: 50px;
            vertical-align: center;
            /* 表格的文本垂直对齐方式 */
            padding: 20px;
            /* 文字距离边框的距离，用了之后可能使上面两条失效 */
            background-color: aqua;
            /* 表格背景颜色 */
            color: brown;
            /* 字体颜色 */
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>单元格</td>
            <td>单元格</td>
            <td>单元格</td>
        </tr>
        <tr>
            <td>单元格</td>
            <td>单元格</td>
            <td>单元格</td>
        </tr>
        <tr>
            <td>单元格</td>
            <td>单元格</td>
            <td>单元格</td>
        </tr>
    </table>
</body>
</html>
