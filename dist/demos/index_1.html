<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 也不推荐使用，内部样式方案，但是太过于单一，对多页面不友好，跳转之后这个就不生效了，所有页面都要写 -->
    <style>
        h3{
            color: red;
            font-size: 30px;
        }
        p{
            color: blue;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h3>标题内容</h3>
    <!-- css有两个部分构成：选择器以及一条或多条声明，选择器通常指的是需要改变样式的html元素 -->
     <p>hhhh</p>

     <!-- 不推荐使用，维护成本高，直接再标签中添加style -->
     <p style="color: red;font-size: 30px;">我是内联样式的演示方案</p>
    <!-- 外部样式推荐使用，当需要应用于很多页面时，外部样式表将是理想的选择 -->
    </body>

</html>
