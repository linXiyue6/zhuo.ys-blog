<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul li{
            color: red;
        }
        /* 后代选择器，只要是ul的后代li标签都生效，无论多后 */
        div>p{
            color: green;
        }
        /* 子代选择器，只对直接子代生效 */
        h3+h4{
            color: blueviolet;
        }
        /* 相邻兄弟选择器，只能向下选择，使用率不高 */
        h5~p{
            color: yellow;
        }
        /* 通用兄弟选择器，选择h5后面所有的p兄弟，上面无效 */
    </style>
</head>
<body>
    <ul>
        <li>列表1</li>
        <li>列表2</li>
        <li>列表3</li>
        <li>列表4</li>
        <div>
            <ol>
                <p>1111</p>
                <li>列表5</li>
                <li>列表6</li>
            </ol>
        </div>
    </ul>
    <div>
        <p>111111</p>
        <h3>22222</h3>
        <ul>
            <li>
                <p>333</p>
            </li>
        </ul>
    </div>
    <div>
        <h3>第三部分</h3>
        <h4>没错，是相邻兄弟选择器</h4>
        <h4>我不会生效</h4>
    </div>
    <div>
        <h5>接下来是通用兄弟选择器</h5>
        <p>我是内容1</p>
        <p>我是内容2</p>
        <span>hhhhh </span>
        <p>我是内容3</p>
    </div>
</body>
</html>
