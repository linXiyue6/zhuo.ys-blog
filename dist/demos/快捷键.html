<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快捷键</title>
</head>
<body>
    <hr>快速生成基本骨架：！+回车
    <hr>代码格式化：shift+alt+f
    <hr>向上向下快速移动这一行：alt+上键up/下键down
    <hr>快速复制一行：shift+alt+up/down
    <hr>快速保存：CTRL+s
    <hr>快速查找：CTRL+f
    <hr>快速替换：CTRL+h
    <hr>注释：CTRL+/
    <hr>从h1开始生成至hN：h$*n
    <hr>ul>li*n,生成n个li标签的结构
    <hr>生成n行m列的表格，其中填充文本信息table>te*n>td*m{文本信息} 例如：table>tr*3>td*4{单元格}
</body>
</html>
