<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新标签</title>
</head>

<body>
    <!-- div内容容器 -->
    <div id="header"></div>
    <div id="nav"></div>
    <div id="article">
        <div id="section"></div>
    </div>
    <div id="footer"></div>

    <!-- 新标签如下 -->
     <!-- 头部 -->
     <header></header>
     <!-- 导航 -->
     <nav></nav>
     <!-- 一个完整的独立的相关内容块，例如一片完整的文章 -->
     <article>
        <!-- 定义文章中的节 -->
        <section></section>
     </article>
     <!-- 侧边栏 -->
     <aside></aside>
     <!-- 脚部 -->
     <footer></footer>
</body>

</html>
